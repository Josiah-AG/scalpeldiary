<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Scalpel Blade (top) -->
  <path d="M 85 40 L 115 40 L 110 70 L 90 70 Z" fill="#1e40af" />
  
  <!-- Blade shine effect -->
  <path d="M 95 45 L 105 45 L 102 65 L 98 65 Z" fill="#3b82f6" opacity="0.5"/>
  
  <!-- Handle (middle) -->
  <rect x="92" y="70" width="16" height="60" rx="2" fill="#60a5fa"/>
  
  <!-- Handle grip lines -->
  <line x1="92" y1="80" x2="108" y2="80" stroke="#1e40af" stroke-width="1" opacity="0.3"/>
  <line x1="92" y1="90" x2="108" y2="90" stroke="#1e40af" stroke-width="1" opacity="0.3"/>
  <line x1="92" y1="100" x2="108" y2="100" stroke="#1e40af" stroke-width="1" opacity="0.3"/>
  <line x1="92" y1="110" x2="108" y2="110" stroke="#1e40af" stroke-width="1" opacity="0.3"/>
  <line x1="92" y1="120" x2="108" y2="120" stroke="#1e40af" stroke-width="1" opacity="0.3"/>
  
  <!-- Base (bottom) -->
  <ellipse cx="100" cy="135" rx="12" ry="8" fill="#1e40af"/>
  
  <!-- Circular background (optional, subtle) -->
  <circle cx="100" cy="90" r="75" fill="none" stroke="#e5e7eb" stroke-width="2" opacity="0.3"/>
</svg>
