<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- S Letter - Left side with gradient -->
  <defs>
    <linearGradient id="sGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0277BD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#01579B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dGradient" x1="100%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0288D1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#01579B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- S Letter -->
  <path d="M 30 50 
           L 100 50 
           L 100 70
           L 50 70
           L 50 90
           L 100 90
           L 100 150
           L 30 150
           L 30 130
           L 80 130
           L 80 110
           L 30 110
           Z" 
        fill="url(#sGradient)" />
  
  <!-- D Letter with curve -->
  <path d="M 110 50
           L 140 50
           Q 170 50 170 80
           L 170 120
           Q 170 150 140 150
           L 110 150
           Z
           M 130 70
           L 130 130
           L 140 130
           Q 150 130 150 120
           L 150 80
           Q 150 70 140 70
           Z" 
        fill="url(#dGradient)" />
  
  <!-- Swoosh connecting element -->
  <path d="M 85 140 Q 100 145 115 140" 
        stroke="#4FC3F7" 
        stroke-width="3" 
        fill="none" 
        opacity="0.6"/>
</svg>
